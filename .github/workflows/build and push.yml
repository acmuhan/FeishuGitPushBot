name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]  # 往 main 分支推送代码时触发构建
    tags: [ 'v*' ]       # 运行打 tag 时触发构建（如 v1.0.0）

env:
  REGISTRY: ghcr.io
  # 镜像名会自动设为: ghcr.io/你的用户名/feishu-git-push-bot
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 必须拥有写入 packages 的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 QEMU 支持多平台构建（如果需要支持 ARM64/v8，比如树莓派或苹果 M 系列服务器）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub 容器注册表
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用内置的临时 token 登录，无需配置 Secret

      # 解析镜像 Tag（自动转为小写，并支持 main、sha、semver 等 tag）
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      # 编译并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64  # 同时打包 amd64 和 arm64 双架构
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max