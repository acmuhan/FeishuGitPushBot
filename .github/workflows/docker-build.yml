name: Docker Build & Push (Multi-Arch)

on:
  push:
    tags:
      - v**

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URI }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          DOCKER_IMAGE="${{ secrets.REGISTRY_URI }}/feishu-git-push-bot/core"
          TAGS="${DOCKER_IMAGE}:latest,${DOCKER_IMAGE}:${{ github.ref_name }}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 关键参数：传递平台编译参数给 Buildx
          build-args: |
            BUILDPLATFORM=${{ runner.os }}
